services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chat-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - FRONTEND_ORIGIN=http://localhost:5173

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chat-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
